<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Копилка концептов</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<style>
:root {
  --bg: #f5f1ea;
  --bg-card: #fbfaf6;
  --ink: #1a1a1a;
  --ink-soft: #4a4a4a;
  --ink-faint: #8a8580;
  --accent: #8b1e1e;
  --line: #d9d3c7;
  --line-soft: #ece6da;
  --shadow: 0 1px 0 rgba(0,0,0,.02), 0 2px 12px rgba(60,40,20,.05);
  --shadow-hover: 0 1px 0 rgba(0,0,0,.02), 0 8px 28px rgba(60,40,20,.12);
  --serif: 'Cormorant Garamond', Georgia, 'Times New Roman', serif;
  --sans: 'Inter', -apple-system, BlinkMacSystemFont, 'Helvetica Neue', sans-serif;
  /* Category palette: muted earth tones */
  --cat-epistem: #4a6280;
  --cat-thermo: #8e4a2e;
  --cat-triz: #997a2e;
  --cat-systems: #5a7548;
  --cat-personal: #7a4a6b;
}
* { box-sizing: border-box; }
html, body { margin: 0; padding: 0; background: var(--bg); color: var(--ink); font-family: var(--sans); font-size: 15px; line-height: 1.55; -webkit-font-smoothing: antialiased; }
/* subtle paper grain via tiny gradient noise */
body {
  background-image:
    radial-gradient(ellipse at top left, rgba(180,140,90,.04), transparent 60%),
    radial-gradient(ellipse at bottom right, rgba(120,80,50,.03), transparent 50%);
  background-attachment: fixed;
}

header.top {
  position: sticky; top: 0; z-index: 50;
  background: rgba(245,241,234,.92); backdrop-filter: blur(8px);
  border-bottom: 1px solid var(--line);
  padding: 16px 32px; display: flex; align-items: baseline; gap: 28px;
}
.brand { font-family: var(--serif); font-size: 24px; font-weight: 600; letter-spacing: .01em; }
.brand em { font-style: italic; color: var(--accent); }
.brand sup { font-size: 11px; font-family: var(--sans); font-weight: 500; color: var(--ink-faint); margin-left: 6px; letter-spacing: .05em; }
.search {
  flex: 1; max-width: 480px;
  background: var(--bg-card); border: 1px solid var(--line);
  padding: 8px 14px; border-radius: 4px;
  font: inherit; color: var(--ink);
  outline: none; transition: border-color .15s;
}
.search:focus { border-color: var(--ink-soft); }
.viewtoggle { display: flex; gap: 2px; background: var(--bg-card); border: 1px solid var(--line); border-radius: 4px; padding: 2px; }
.viewtoggle button {
  background: transparent; border: 0; padding: 6px 14px; font: inherit; font-size: 13px; color: var(--ink-soft); cursor: pointer; border-radius: 3px;
}
.viewtoggle button.active { background: var(--ink); color: var(--bg-card); }
.count { color: var(--ink-faint); font-size: 13px; font-variant-numeric: tabular-nums; }

main { padding: 40px 32px 80px; max-width: 1400px; margin: 0 auto; }

.intro { font-family: var(--serif); font-style: italic; font-size: 20px; color: var(--ink-soft); margin: 0 0 32px; max-width: 720px; line-height: 1.4; }

/* Cards view */
.grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
  gap: 20px;
}
.card {
  background: var(--bg-card); border: 1px solid var(--line);
  border-radius: 4px; padding: 24px 24px 20px;
  box-shadow: var(--shadow);
  cursor: pointer; transition: box-shadow .18s, transform .18s, border-color .18s;
  display: flex; flex-direction: column; min-height: 240px;
  position: relative; overflow: hidden;
}
.card::before {
  content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 3px;
  background: var(--cat); opacity: 0; transition: opacity .18s;
}
.card:hover { box-shadow: var(--shadow-hover); transform: translateY(-2px); border-color: var(--ink-faint); }
.card:hover::before { opacity: 1; }
.card .meta-top { display: flex; justify-content: space-between; align-items: baseline; gap: 10px; margin-bottom: 14px; }
.card .formal-name { font-family: var(--sans); font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: .1em; color: var(--accent); }
.card .category { font-size: 11px; color: var(--ink-faint); letter-spacing: .04em; display: inline-flex; align-items: center; gap: 6px; }
.cat-dot { display: inline-block; width: 7px; height: 7px; border-radius: 50%; background: var(--cat, var(--ink-faint)); flex-shrink: 0; }
.card .principle {
  font-family: var(--serif); font-size: 26px; line-height: 1.18; font-weight: 500; color: var(--ink);
  margin: 0 0 14px; letter-spacing: -.005em; position: relative;
}
.card .principle::before { content: '«'; color: var(--ink-faint); margin-right: 1px; font-weight: 400; }
.card .principle::after { content: '»'; color: var(--ink-faint); margin-left: 1px; font-weight: 400; }
.card .preview { font-size: 14px; color: var(--ink-soft); margin: 0 0 14px; flex: 1; line-height: 1.5; }
.card .tags { display: flex; flex-wrap: wrap; gap: 6px; }
.card .tag { font-size: 11px; padding: 3px 8px; background: var(--line-soft); border-radius: 100px; color: var(--ink-soft); }

/* Detail panel */
.detail-backdrop {
  position: fixed; inset: 0; background: rgba(20,15,10,.35); z-index: 100;
  opacity: 0; pointer-events: none; transition: opacity .2s;
}
.detail-backdrop.open { opacity: 1; pointer-events: auto; }
.detail {
  position: fixed; top: 0; right: 0; bottom: 0; width: min(640px, 92vw);
  background: var(--bg-card); z-index: 101; box-shadow: -8px 0 32px rgba(40,30,20,.15);
  transform: translateX(100%); transition: transform .25s ease-out;
  overflow-y: auto; padding: 48px 56px 80px;
  border-left: 4px solid var(--cat, var(--accent));
}
.detail.open { transform: translateX(0); }
.detail .close { position: absolute; top: 20px; right: 24px; background: none; border: 0; font-size: 28px; color: var(--ink-faint); cursor: pointer; line-height: 1; padding: 4px 8px; }
.detail .close:hover { color: var(--ink); }
.detail .d-formal { font-size: 12px; font-weight: 600; letter-spacing: .12em; text-transform: uppercase; color: var(--accent); margin-bottom: 8px; }
.detail .d-principle { font-family: var(--serif); font-size: 36px; line-height: 1.12; font-weight: 500; margin: 0 0 24px; letter-spacing: -.01em; }
.detail .d-principle::before { content: '«'; color: var(--ink-faint); }
.detail .d-principle::after { content: '»'; color: var(--ink-faint); }
.detail .d-body { font-size: 16px; line-height: 1.65; color: var(--ink); margin-bottom: 28px; }
.detail h3 { font-family: var(--sans); font-size: 11px; font-weight: 700; letter-spacing: .12em; text-transform: uppercase; color: var(--ink-faint); margin: 24px 0 10px; }
.detail .d-source { font-style: italic; color: var(--ink-soft); font-family: var(--serif); font-size: 18px; }
.detail .d-apps { padding-left: 18px; margin: 0; }
.detail .d-apps li { margin-bottom: 8px; color: var(--ink-soft); }
.detail .d-related { display: flex; flex-wrap: wrap; gap: 8px; }
.detail .d-related a {
  font-size: 13px; padding: 5px 12px; background: var(--line-soft); border-radius: 100px;
  color: var(--ink); text-decoration: none; transition: background .15s;
}
.detail .d-related a:hover { background: var(--ink); color: var(--bg-card); }
.detail .d-tags { display: flex; flex-wrap: wrap; gap: 6px; }
.detail .d-tags .tag { font-size: 11px; padding: 3px 8px; background: var(--line-soft); border-radius: 100px; color: var(--ink-soft); }

/* Timeline view */
#graph { display: none; }
#graph.active { display: block; }
.cards-view.hidden { display: none; }
#graph svg { width: 100%; height: calc(100vh - 200px); min-height: 560px; background: var(--bg-card); border: 1px solid var(--line); border-radius: 4px; display: block; }
.tl-axis { stroke: var(--line); stroke-width: 1; }
.tl-tick { stroke: var(--line); stroke-width: 1; }
.tl-tick-label { font-family: var(--sans); font-size: 11px; fill: var(--ink-faint); letter-spacing: .04em; }
.tl-break { stroke: var(--ink-faint); stroke-width: 1; stroke-dasharray: 2 3; }
.tl-lane-label { font-family: var(--sans); font-size: 10px; font-weight: 600; letter-spacing: .12em; text-transform: uppercase; }
.tl-lane-dot { stroke: none; }
.tl-lane-line { stroke: var(--line-soft); stroke-width: 1; }
.tl-influence { fill: none; stroke: var(--ink-soft); stroke-width: 1.2; stroke-opacity: .55; }
.tl-arrow { fill: var(--ink-soft); fill-opacity: .55; }
.tl-node { cursor: pointer; }
.tl-node circle { stroke-width: 1.5; transition: r .18s; }
.tl-node:hover circle { r: 9; }
.tl-node:hover .tl-name { font-weight: 700; }
.tl-name { font-family: var(--sans); font-size: 12px; font-weight: 500; fill: var(--ink); pointer-events: none; transition: font-weight .15s; }
.tl-year { font-family: var(--sans); font-size: 10px; fill: var(--ink-faint); pointer-events: none; letter-spacing: .05em; }
.tl-hint { font-family: var(--serif); font-style: italic; font-size: 13px; fill: var(--ink-faint); }

footer { text-align: center; color: var(--ink-faint); font-size: 12px; padding: 32px; border-top: 1px solid var(--line); margin-top: 60px; }
footer em { font-style: italic; }

@media (max-width: 600px) {
  header.top { flex-wrap: wrap; padding: 12px 16px; gap: 12px; }
  .search { order: 3; width: 100%; max-width: none; }
  main { padding: 24px 16px 60px; }
  .grid { grid-template-columns: 1fr; }
  .detail { padding: 40px 24px 60px; }
  .detail .d-principle { font-size: 28px; }
}
</style>
</head>
<body>

<header class="top">
  <div class="brand">Копилка <em>концептов</em><sup id="counter">—</sup></div>
  <input type="text" id="search" class="search" placeholder="Поиск по концептам, тегам, формулировкам…" />
  <div class="viewtoggle">
    <button id="btn-cards" class="active">Карточки</button>
    <button id="btn-graph">Хронология</button>
  </div>
</header>

<main>
  <p class="intro">
    Каждый концепт — это <strong>руководящий принцип</strong> в формулировке-афоризме, и за ним —
    академическое имя, контекст и связи с другими концептами. Цель — иметь под рукой инструменты мышления,
    а не словарь определений.
  </p>

  <section id="cards" class="cards-view">
    <div class="grid" id="grid"></div>
  </section>

  <section id="graph">
    <svg id="graph-svg"></svg>
  </section>
</main>

<div class="detail-backdrop" id="backdrop"></div>
<aside class="detail" id="detail">
  <button class="close" id="close-detail" aria-label="Закрыть">×</button>
  <div id="detail-body"></div>
</aside>

<footer>
  Копилка концептов · <em>живой документ</em> · последнее обновление: <span id="last-updated">—</span>
</footer>

<script>
const DATA = JSON.parse(document.getElementById('data').textContent);
const concepts = DATA.concepts;
const byId = Object.fromEntries(concepts.map(c => [c.id, c]));

// Category → color
const CAT_COLORS = {
  "Эпистемология": "var(--cat-epistem)",
  "Термодинамика": "var(--cat-thermo)",
  "ТРИЗ": "var(--cat-triz)",
  "Системное мышление": "var(--cat-systems)",
  "Личная философия": "var(--cat-personal)"
};
const CAT_HEX = {
  "Эпистемология": "#4a6280",
  "Термодинамика": "#8e4a2e",
  "ТРИЗ": "#997a2e",
  "Системное мышление": "#5a7548",
  "Личная философия": "#7a4a6b"
};
const catColor = c => CAT_COLORS[c] || "var(--ink-faint)";
const catHex = c => CAT_HEX[c] || "#8a8580";

document.getElementById('counter').textContent = `№ ${concepts.length}`;
document.getElementById('last-updated').textContent = new Date().toLocaleDateString('ru-RU', { year: 'numeric', month: 'long', day: 'numeric' });

// Render cards
function renderCards(filter = '') {
  const grid = document.getElementById('grid');
  const q = filter.trim().toLowerCase();
  const filtered = concepts.filter(c => {
    if (!q) return true;
    const hay = [c.principle, c.name, c.category, c.preview, c.body, ...(c.tags || [])].join(' ').toLowerCase();
    return hay.includes(q);
  });
  grid.innerHTML = filtered.map(c => `
    <article class="card" data-id="${c.id}" style="--cat: ${catColor(c.category)}">
      <div class="meta-top">
        <span class="formal-name">${c.name}</span>
        <span class="category"><span class="cat-dot"></span>${c.category}</span>
      </div>
      <h2 class="principle">${escapeHtml(c.principle)}</h2>
      <p class="preview">${escapeHtml(c.preview)}</p>
      <div class="tags">${(c.tags || []).map(t => `<span class="tag">${escapeHtml(t)}</span>`).join('')}</div>
    </article>
  `).join('');
  grid.querySelectorAll('.card').forEach(el => {
    el.addEventListener('click', () => openDetail(el.dataset.id));
  });
}

function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

// Compute descendants (inverse of influences)
const descendantsOf = {};
concepts.forEach(c => {
  (c.influences || []).forEach(pid => {
    (descendantsOf[pid] = descendantsOf[pid] || []).push(c.id);
  });
});

// Detail panel
function openDetail(id) {
  const c = byId[id];
  if (!c) return;
  const predecessors = (c.influences || []).map(rid => byId[rid]).filter(Boolean);
  const descendants = (descendantsOf[c.id] || []).map(rid => byId[rid]).filter(Boolean);
  document.getElementById('detail').style.setProperty('--cat', catColor(c.category));
  document.getElementById('detail-body').innerHTML = `
    <div class="d-formal"><span class="cat-dot" style="--cat: ${catColor(c.category)}"></span>${escapeHtml(c.name)} · ${escapeHtml(c.category)} · ${c.year}</div>
    <h1 class="d-principle">${escapeHtml(c.principle)}</h1>
    <p class="d-body">${escapeHtml(c.body)}</p>
    <h3>Где работает</h3>
    <ul class="d-apps">${(c.applications || []).map(a => `<li>${escapeHtml(a)}</li>`).join('')}</ul>
    <h3>Источник</h3>
    <p class="d-source">${escapeHtml(c.source)}</p>
    ${predecessors.length ? `<h3>Откуда (на чьих плечах стоит)</h3><div class="d-related">${predecessors.map(r => `<a href="#" data-id="${r.id}">${escapeHtml(r.name)} · ${r.year}</a>`).join('')}</div>` : ''}
    ${descendants.length ? `<h3>Куда (что выросло дальше)</h3><div class="d-related">${descendants.map(r => `<a href="#" data-id="${r.id}">${escapeHtml(r.name)} · ${r.year}</a>`).join('')}</div>` : ''}
    ${c.tags && c.tags.length ? `<h3>Теги</h3><div class="d-tags">${c.tags.map(t => `<span class="tag">${escapeHtml(t)}</span>`).join('')}</div>` : ''}
  `;
  document.getElementById('detail').classList.add('open');
  document.getElementById('backdrop').classList.add('open');
  document.querySelectorAll('.d-related a').forEach(a => {
    a.addEventListener('click', e => { e.preventDefault(); openDetail(a.dataset.id); });
  });
}
function closeDetail() {
  document.getElementById('detail').classList.remove('open');
  document.getElementById('backdrop').classList.remove('open');
}
document.getElementById('close-detail').addEventListener('click', closeDetail);
document.getElementById('backdrop').addEventListener('click', closeDetail);
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeDetail(); });

// Search
document.getElementById('search').addEventListener('input', e => renderCards(e.target.value));

// View toggle
const btnCards = document.getElementById('btn-cards');
const btnGraph = document.getElementById('btn-graph');
btnCards.addEventListener('click', () => switchView('cards'));
btnGraph.addEventListener('click', () => switchView('graph'));
function switchView(v) {
  if (v === 'cards') {
    btnCards.classList.add('active'); btnGraph.classList.remove('active');
    document.getElementById('cards').classList.remove('hidden');
    document.getElementById('graph').classList.remove('active');
  } else {
    btnGraph.classList.add('active'); btnCards.classList.remove('active');
    document.getElementById('cards').classList.add('hidden');
    document.getElementById('graph').classList.add('active');
    renderTimeline();
  }
}

// ── Timeline (genealogy) view ─────────────────────────────────────────────
// X-axis: time. Piecewise-linear so the pre-1800 range doesn't dwarf modern era.
// Y-axis: swim lanes per category.
// Curves: predecessor → descendant (from `influences` field).
let timelineRendered = false;
function renderTimeline() {
  if (timelineRendered) return;
  timelineRendered = true;
  const svg = document.getElementById('graph-svg');
  const W = 1240, H = 800;
  svg.setAttribute('viewBox', `0 0 ${W} ${H}`);
  svg.setAttribute('preserveAspectRatio', 'xMidYMid meet');

  // ── Layout constants
  const LEFT_PAD = 180;       // room for lane labels
  const RIGHT_PAD = 40;
  const TOP_PAD = 48;
  const BOTTOM_PAD = 60;
  const BREAK_YEAR = 1800;    // axis break between pre-modern and modern
  const Y_MIN = -500, Y_MAX = 2040;
  const PRE_FRACTION = 0.34;  // how much horizontal space pre-1800 gets

  const innerW = W - LEFT_PAD - RIGHT_PAD;
  const preW = innerW * PRE_FRACTION;
  const postW = innerW - preW - 20; // 20px gap for the break marker

  function xOf(year) {
    if (year < BREAK_YEAR) {
      return LEFT_PAD + preW * (year - Y_MIN) / (BREAK_YEAR - Y_MIN);
    } else {
      return LEFT_PAD + preW + 20 + postW * (year - BREAK_YEAR) / (Y_MAX - BREAK_YEAR);
    }
  }

  // ── Lanes from categories, ordered "hard" → "soft"
  const categoryOrder = ["Эпистемология", "Термодинамика", "ТРИЗ", "Системное мышление", "Личная философия"];
  const seenCats = [...new Set(concepts.map(c => c.category))];
  const lanes = [
    ...categoryOrder.filter(c => seenCats.includes(c)),
    ...seenCats.filter(c => !categoryOrder.includes(c))
  ];
  const laneH = (H - TOP_PAD - BOTTOM_PAD) / lanes.length;
  const laneY = cat => TOP_PAD + lanes.indexOf(cat) * laneH + laneH / 2;

  // ── Compute node positions with greedy per-lane vertical de-overlap
  const positioned = concepts.map(c => ({ ...c, _x: xOf(c.year), _y: laneY(c.category) }));
  // For each lane, place concepts left-to-right, trying offsets until no collision
  const offsetSequence = [0, -24, 24, -48, 48, -72, 72, -36, 36, -60, 60, -12, 12];
  lanes.forEach(cat => {
    const inLane = positioned.filter(p => p.category === cat).sort((a, b) => a._x - b._x);
    const base = laneY(cat);
    const placed = [];
    inLane.forEach(p => {
      for (const off of offsetSequence) {
        const candY = base + off;
        const conflict = placed.some(o => Math.abs(p._x - o._x) < 130 && Math.abs(candY - o._y) < 24);
        if (!conflict) { p._y = candY; break; }
      }
      placed.push(p);
    });
  });
  const posById = Object.fromEntries(positioned.map(p => [p.id, p]));

  // ── Build SVG
  let html = '';

  // Lane backgrounds + labels
  lanes.forEach((cat, i) => {
    const y = TOP_PAD + i * laneH;
    if (i % 2 === 0) {
      html += `<rect x="${LEFT_PAD - 8}" y="${y}" width="${innerW + 8}" height="${laneH}" fill="rgba(0,0,0,0.012)"/>`;
    }
    html += `<line class="tl-lane-line" x1="${LEFT_PAD}" y1="${y + laneH}" x2="${W - RIGHT_PAD}" y2="${y + laneH}"/>`;
    const cx = catHex(cat);
    html += `<circle class="tl-lane-dot" cx="${LEFT_PAD - 8}" cy="${y + laneH/2}" r="3.5" fill="${cx}"/>`;
    html += `<text class="tl-lane-label" x="${LEFT_PAD - 18}" y="${y + laneH/2 + 4}" text-anchor="end" fill="${cx}">${escapeHtml(cat)}</text>`;
  });

  // Time axis
  const axisY = H - BOTTOM_PAD + 12;
  html += `<line class="tl-axis" x1="${LEFT_PAD}" y1="${axisY}" x2="${W - RIGHT_PAD}" y2="${axisY}"/>`;

  const ticksPre = [-400, 100, 500, 1000, 1500];
  const ticksPost = [1800, 1900, 1950, 2000, 2025];
  [...ticksPre, ...ticksPost].forEach(yr => {
    const x = xOf(yr);
    html += `<line class="tl-tick" x1="${x}" y1="${axisY - 4}" x2="${x}" y2="${axisY + 4}"/>`;
    html += `<text class="tl-tick-label" x="${x}" y="${axisY + 18}" text-anchor="middle">${yr}</text>`;
  });
  // Axis break marker
  const brkX = LEFT_PAD + preW + 10;
  html += `<line class="tl-break" x1="${brkX - 4}" y1="${axisY - 6}" x2="${brkX + 4}" y2="${axisY + 6}"/>`;
  html += `<line class="tl-break" x1="${brkX + 4}" y1="${axisY - 6}" x2="${brkX + 12}" y2="${axisY + 6}"/>`;

  // Hint (only if few concepts)
  if (concepts.length < 12) {
    html += `<text class="tl-hint" x="${W/2}" y="${TOP_PAD - 18}" text-anchor="middle">генеалогия концептов: кто на чьих плечах стоит</text>`;
  }

  // Arrowhead def
  html += `<defs><marker id="tl-arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto">
    <path d="M0,0 L10,5 L0,10 z" class="tl-arrow"/>
  </marker></defs>`;

  // Influence curves (drawn before nodes so nodes overlap them)
  concepts.forEach(c => {
    (c.influences || []).forEach(pid => {
      const from = posById[pid], to = posById[c.id];
      if (!from || !to) return;
      const x1 = from._x + 6, y1 = from._y;
      const x2 = to._x - 6, y2 = to._y;
      // bezier with control points pulled horizontally
      const dx = x2 - x1;
      const cx1 = x1 + dx * 0.35, cy1 = y1;
      const cx2 = x2 - dx * 0.35, cy2 = y2;
      html += `<path class="tl-influence" d="M${x1},${y1} C${cx1},${cy1} ${cx2},${cy2} ${x2},${y2}" marker-end="url(#tl-arrow)"/>`;
    });
  });

  // Concept nodes: dot + name above + year below. Anchor labels left/right near edges so they don't clip.
  positioned.forEach(p => {
    const nearLeft = p._x < (LEFT_PAD + 80);
    const nearRight = p._x > (W - RIGHT_PAD - 140);
    let anchor = 'middle', labelX = p._x;
    if (nearLeft && !nearRight) { anchor = 'start'; labelX = p._x; }
    else if (nearRight) { anchor = 'end'; labelX = p._x; }
    const cx = catHex(p.category);
    html += `<g class="tl-node" data-id="${p.id}">
      <circle cx="${p._x}" cy="${p._y}" r="6" fill="${cx}" stroke="${cx}"/>
      <text class="tl-name" x="${labelX}" y="${p._y - 14}" text-anchor="${anchor}">${escapeHtml(p.name)}</text>
      <text class="tl-year" x="${labelX}" y="${p._y + 22}" text-anchor="${anchor}">${p.year}</text>
      <title>${escapeHtml(p.principle)}</title>
    </g>`;
  });

  svg.innerHTML = html;
  svg.querySelectorAll('.tl-node').forEach(g => {
    g.addEventListener('click', () => openDetail(g.dataset.id));
  });
}

// Initial render
renderCards();
</script>

</body>
</html>
